# Pose-based CausalTCN — без CNN backbone
# Вход: 33 MediaPipe ключевые точки × 3 = 99-dim
experiment:
  name: "pose_causal_tcn"

model:
  model_type: "pose"
  temporal_head: "causal_tcn"
  hidden_dim: 256
  dropout: 0.3

training:
  epochs: 50
  lr: 1.0e-3
  weight_decay: 1.0e-4
  early_stopping_patience: 10
