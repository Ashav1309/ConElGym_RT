# MobileNetV3-Small + Frame Difference + TCN
experiment:
  name: "mobilenet_v3_small_framediff_tcn"

model:
  backbone: "mobilenet_v3_small_framediff"
  temporal_head: "causal_tcn"
  hidden_dim: 128
  n_layers: 2
  dropout: 0.3

training:
  epochs: 50
  lr: 1.0e-3
  weight_decay: 1.0e-4
  early_stopping_patience: 10
