# EfficientNet-B0 + Frame Difference + TCN
experiment:
  name: "efficientnet_b0_framediff_tcn"

model:
  backbone: "efficientnet_b0_framediff"
  temporal_head: "tcn"
  hidden_dim: 128
  n_layers: 2
  dropout: 0.3

training:
  epochs: 50
  lr: 1.0e-3
  weight_decay: 1.0e-4
  early_stopping_patience: 10
